<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
  </head>
  <body>
    <h2>Add Tasks</h2>

    <form method="post">
      {% csrf_token %}
      <label for="title">Add Title:</label>
      <input type="text" id="title" name="title" required />

      <label for="desc">Description:</label>
      <input type="text" id="desc" name="desc" required />

      <label for="due_date">Due Date:</label>
      <input type="date" id="due_date" name="due_date" required />

      <label for="priority">Priority:</label>
      <input type="text" id="priority" name="priority" required />

      <button type="submit">Save and Add New Task</button><br />
      <a class="btn btn-primary" href="{% url 'list_task' %}" role="button">Add Task</a>
      <br />
      <a class="btn btn-primary" href="{% url 'main' %}" role="button">Home</a>
    </form>
  </body>
</html>
{% comment %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <title>Dashboard</title>
  </head>
  <body>
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal" data-bs-whatever="@mdo">Open modal for @mdo</button>
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">Add new task</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form>
              <div class="mb-3">
                <label for="recipient-name" class="col-form-label">Title:</label>
                <input type="text" class="form-control" id="title" />
              </div>
              <div class="mb-3">
                <label for="message-text" class="col-form-label">Description:</label>
                <textarea class="form-control" id="desc"></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" id="add-btn" class="btn btn-secondary" data-bs-dismiss="modal">Add Task</button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html> {% endcomment %}
