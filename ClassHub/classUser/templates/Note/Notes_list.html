<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    {% block content %}
      <h2>List of Notes</h2>
      {% for note in Notes %}
        <div>
          <h3>{{ note.title }}</h3>
          <a href="{{ note.file.url }}" target="_blank">Open Note</a>
        </div>
      {% endfor %}
    {% endblock %}
  </body>
</html>
